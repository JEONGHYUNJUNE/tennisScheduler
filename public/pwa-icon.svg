<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ONS Tennis app icon">
  <defs>
    <radialGradient id="ball" cx="35%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#f4ff74"/>
      <stop offset="48%" stop-color="#dcef45"/>
      <stop offset="100%" stop-color="#a9c72b"/>
    </radialGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#315f3b" stop-opacity=".28"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#253026" flood-opacity=".22"/>
    </filter>
    <filter id="texture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="3" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .12"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="ballClip">
      <circle cx="256" cy="256" r="214"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="112" fill="#edf6ea"/>
  <circle cx="256" cy="256" r="214" fill="url(#ball)" filter="url(#softShadow)"/>
  <circle cx="256" cy="256" r="214" fill="url(#shadow)" opacity=".4"/>
  <circle cx="256" cy="256" r="214" fill="url(#ball)" filter="url(#texture)" opacity=".9"/>

  <g clip-path="url(#ballClip)">
    <path d="M42 128 A350 104 0 0 0 470 128" fill="none" stroke="#fffdf8" stroke-width="17" stroke-linecap="round" opacity=".92"/>
    <path d="M42 384 A350 104 0 0 1 470 384" fill="none" stroke="#fffdf8" stroke-width="17" stroke-linecap="round" opacity=".92"/>
    <path d="M48 138 A340 92 0 0 0 464 138" fill="none" stroke="#7b9430" stroke-width="4" stroke-linecap="round" opacity=".34"/>
    <path d="M48 394 A340 92 0 0 1 464 394" fill="none" stroke="#7b9430" stroke-width="4" stroke-linecap="round" opacity=".34"/>
  </g>

  <text x="235" y="275" text-anchor="middle"
        font-family="Arial Black, Impact, system-ui, sans-serif"
        font-size="112" font-weight="900" font-style="italic"
        letter-spacing="-7" fill="#172219">ONS</text>
  <text x="256" y="329" text-anchor="middle"
        font-family="Arial Black, Impact, system-ui, sans-serif"
        font-size="42" font-weight="900"
        letter-spacing="4" fill="#172219">TENNIS</text>
</svg>
